name: social_network
description: "MangaK - Professional Manga Reading App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Network
  dio: ^5.4.3
  
  # Storage
  flutter_secure_storage: ^9.2.2
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  
  # Images
  cached_network_image: ^3.3.1
  
  # Real-time
  pusher_channels_flutter: ^2.1.0
  
  # Notifications / Toast
  overlay_support: ^2.1.0
  fluttertoast: ^8.2.8
  
  # UI
  shimmer: ^3.0.0
  photo_view: ^0.14.0
  flutter_svg: ^2.0.10
  badges: ^3.1.2
  timeago: ^3.6.1
  
  # Utils
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
